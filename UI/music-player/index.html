<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<style>
  :root {
    --bg-dark: #0A1628;
    --bg-pill: #111B40;
    --bg-border: #1E3A5F;
    --accent: #4FC3F7;
    --accent-dark: #29B6F6;
    --cover-navy-1: #2B4D76;
    --cover-navy-2: #1E3A5F;
    --text-primary: #E0E8F0;
    --text-secondary: #8899AA;
    --dot-gray: #B3B3B3;
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .app {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    background: var(--bg-dark);
  }

  @media (max-width: 390px) {
    .app { width: 100vw; height: 100vh; border-radius: 0; }
  }

  @media (min-width: 391px) and (max-width: 844px) {
    .app {
      width: 100vw;
      height: calc(100vw * 844 / 390);
      max-height: 100vh;
    }
  }

  @media (min-width: 845px) {
    .app {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      box-shadow: var(--shadow-lg);
    }
  }

  /* Screen container */
  .screens {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg-dark);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .screen.library {
    opacity: 1;
    transform: translateX(0);
    z-index: 1;
  }

  .screen.library.hidden {
    opacity: 0;
    transform: translateX(-30px);
    pointer-events: none;
    z-index: 0;
  }

  .screen.now-playing {
    opacity: 0;
    transform: translateX(30px);
    pointer-events: none;
    z-index: 0;
  }

  .screen.now-playing.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    z-index: 1;
  }

  /* ======= LIBRARY SCREEN ======= */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 62px;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status-bar .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #fff;
  }

  .content-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 0;
    gap: 24px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header .title {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header .header-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header .header-actions .icon-btn {
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Recent Section */
  .section-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .recent-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .album-row {
    display: flex;
    gap: 12px;
  }

  .album-cover {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    flex-shrink: 0;
  }

  .album-cover.c1 { background: var(--accent); }
  .album-cover.c2 { background: var(--accent-dark); }
  .album-cover.c3 { background: var(--cover-navy-1); }
  .album-cover.c4 { background: var(--cover-navy-2); }
  .album-cover.c5 { background: var(--accent); }

  /* Song List */
  .song-list-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .song-count {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .track-row {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 64px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .track-row:active {
    background: rgba(255,255,255,0.04);
  }

  .track-cover {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .track-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .track-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .track-duration {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .more-btn {
    width: 24px;
    height: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .more-btn .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--dot-gray);
  }

  /* Bottom Tab Bar */
  .bottom-tab-bar {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    height: 95px;
    padding: 12px 21px;
    flex-shrink: 0;
  }

  .tab-pill {
    display: flex;
    gap: 4px;
    width: 348px;
    height: 62px;
    background: var(--bg-pill);
    border: 1px solid var(--bg-border);
    border-radius: 36px;
    padding: 4px;
  }

  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-radius: 26px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .tab-item.active {
    background: var(--accent);
  }

  .tab-item .tab-icon {
    width: 18px;
    height: 18px;
  }

  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 600;
  }

  .tab-item.active .tab-label {
    color: var(--bg-dark);
  }

  .tab-item:not(.active) .tab-label {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ======= NOW PLAYING SCREEN ======= */
  .np-status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 62px;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .back-btn, .np-menu-btn {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .np-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 0 20px;
  }

  .album-art {
    width: 280px;
    height: 280px;
    background: var(--accent);
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }

  .np-track-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .np-track-name {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .np-artist {
    font-size: 16px;
    color: var(--text-secondary);
  }

  /* Progress Bar */
  .progress-container {
    width: 350px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--bg-border);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    overflow: visible;
  }

  .progress-fill {
    height: 4px;
    width: 50%;
    background: var(--accent);
    border-radius: 2px;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: -3px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .progress-track:hover .progress-fill::after {
    opacity: 1;
  }

  .progress-times {
    display: flex;
    justify-content: space-between;
  }

  .progress-times span {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Controls */
  .controls-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 350px;
    height: 80px;
    background: var(--bg-pill);
    border-radius: 16px;
    padding: 0 20px;
  }

  .ctrl-btn {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .prev-next-btn {
    width: 28px;
    height: 28px;
  }

  .play-btn {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin: 0 12px;
    transition: transform 0.15s;
  }

  .play-btn:active { transform: scale(0.95); }

  /* Extra Actions */
  .extra-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .extra-btn {
    width: 24px;
    height: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SVG icon styles */
  .icon svg {
    display: block;
  }
  .icon-stroke-white svg line,
  .icon-stroke-white svg path,
  .icon-stroke-white svg circle { stroke: #fff; }
  .icon-stroke-gray svg line,
  .icon-stroke-gray svg path,
  .icon-stroke-gray svg circle { stroke: var(--dot-gray); }
  .icon-fill-black svg path { fill: #000; }
  .icon-stroke-black svg path { stroke: #000; }
  .icon-stroke-gray2 svg line,
  .icon-stroke-gray2 svg path { stroke: var(--text-secondary); }
</style>
</head>
<body>

  const tracks = {

    4: { name: '稻香', artist: '周杰伦', duration: '3:43', current: '1:51', pct: 50, color: '#29B6F6' },
    5: { name: '东风破', artist: '周杰伦', duration: '5:15', current: '3:22', pct: 64, color: '#2B4D76' },
    6: { name: '青花瓷', artist: '周杰伦', duration: '3:59', current: '2:03', pct: 51, color: '#4FC3F7' }
  };

  // Navigate to Now Playing
  document.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', function() {
      const trackId = this.dataset.track;
      const track = tracks[trackId];
      openNowPlaying(track);
    });
  });

  function openNowPlaying(track) {
    npTrackName.textContent = track.name;
    npArtist.textContent = track.artist;
    currentTime.textContent = track.current;
    totalTime.textContent = track.duration;
    progressFill.style.width = track.pct + '%';
    document.querySelector('.album-art').style.background = track.color;

    libraryScreen.classList.add('hidden');
    nowPlayingScreen.classList.add('visible');
  }

  // Back button
  backBtn.addEventListener('click', () => {
    nowPlayingScreen.classList.remove('visible');
    libraryScreen.classList.remove('hidden');
  });

  // Play/Pause toggle
  playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    if (isPlaying) {
      playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1" fill="#0A1628"/><rect x="14" y="4" width="4" height="16" rx="1" fill="#0A1628"/>';
    } else {
      playIcon.innerHTML = '<path d="M8 3v18l15-9L8 3z" fill="#0A1628"/>';
    }
  });

  // Tab switching (visual only)
  document.getElementById('importTab').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('libraryTab').classList.remove('active');
  });
  document.getElementById('libraryTab').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('importTab').classList.remove('active');
  });
</script>

</body>
</html>
